<div class="review-page">
  <!-- Header -->
  <div class="review-header">
    <button class="back-btn" (click)="goBack()" aria-label="Go back">&#8592;</button>
    <h2 class="page-title">Review</h2>
    @if (!_done() && !_loading()) {
      <span class="remaining-badge">{{ _remaining() }} left</span>
    }
  </div>

  @if (_loading()) {
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Loading cards...</p>
    </div>
  } @else if (_done()) {
    <div class="done-state">
      <div class="done-icon">&#10003;</div>
      <h3 class="done-title">Session complete!</h3>
      <p class="done-subtitle">{{ _correctCount() }} correct out of {{ _items().length }}</p>
      <a class="btn-primary" routerLink="/review/stats">View stats</a>
      <button class="btn-secondary" (click)="goBack()">Back to home</button>
    </div>
  } @else {
    <app-flashcard [item]="_currentItem()!" (rated)="onRated($event)" />
  }
</div>
