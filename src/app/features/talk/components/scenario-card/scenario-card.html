<button class="card" (click)="onSelect()" type="button">
  <span class="card-icon" aria-hidden="true">{{ icon }}</span>
  <span class="card-name">{{ scenario().title }}</span>
  <span class="card-desc">{{ scenario().description }}</span>
  <span class="card-badge" [attr.data-level]="scenario().cefrLevel">
    {{ scenario().cefrLevel | uppercase }}
  </span>
</button>
