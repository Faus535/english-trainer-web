<div class="popup" role="dialog" aria-label="Word translation">
  @if (loading()) {
    <div class="popup-loading" aria-busy="true">
      <span class="spinner" aria-hidden="true"></span>
      <p>Translating...</p>
    </div>
  } @else if (error()) {
    <div class="popup-error">
      <p class="error-msg" role="alert">{{ error() }}</p>
      <button type="button" class="dismiss-btn" (click)="onDismiss()">Close</button>
    </div>
  } @else if (translation()) {
    <div class="popup-content">
      <p class="word-phrase">{{ translation()!.wordOrPhrase }}</p>

      @if (showDefinition()) {
        <p class="definition-text">{{ translation()!.englishDefinition }}</p>
      } @else {
        <p class="translation-text">{{ translation()!.translation }}</p>
      }

      <button type="button" class="toggle-btn" (click)="toggleDefinition()">
        {{ showDefinition() ? 'Show Spanish' : 'Show English' }}
      </button>

      <p class="context-sentence">{{ translation()!.contextSentence }}</p>
      <div class="popup-actions">
        <button type="button" class="save-btn" (click)="onConfirmSave()">Add to review</button>
        <button type="button" class="dismiss-btn" (click)="onDismiss()">Close</button>
      </div>
    </div>
  }
</div>
