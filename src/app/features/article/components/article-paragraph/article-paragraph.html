<div
  class="paragraph"
  [class.active]="isActive()"
  [class.speaker-ai]="paragraph().speaker === 'AI'"
  [class.speaker-user]="paragraph().speaker === 'USER'"
  (mouseup)="onTextSelect()"
  (touchend)="onTextSelect()"
>
  <p class="paragraph-text">{{ paragraph().content }}</p>

  @if (isActive()) {
    <div class="paragraph-actions">
      @if (paragraph().speaker === 'AI') {
        @if (tts.speaking()) {
          <button type="button" class="skip-btn" (click)="onSkipTts()">Skip</button>
        } @else {
          <button type="button" class="mark-read-btn" (click)="onMarkRead()">Mark as read</button>
        }
      } @else {
        <button type="button" class="mark-read-btn" (click)="onMarkRead()">Mark as read</button>
      }
    </div>
  }
</div>
