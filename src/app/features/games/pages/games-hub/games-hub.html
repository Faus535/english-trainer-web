<div class="games-hub">
  <header class="gh-header">
    <h1 class="gh-title">Practica rapida</h1>
    <p class="gh-subtitle">Juegos de 2 minutos para reforzar tu ingles</p>
  </header>

  <div class="gh-grid">
    @for (game of games; track game.route) {
      <a class="gh-card" [routerLink]="game.route">
        <div class="gh-card-icon">
          <app-icon [name]="game.icon" [size]="28" aria-hidden="true" />
        </div>
        <div class="gh-card-info">
          <h2 class="gh-card-name">{{ game.name }}</h2>
          <p class="gh-card-desc">{{ game.description }}</p>
        </div>
        @let score = getBestScore(game.storageKey);
        @if (score !== null) {
          <div class="gh-card-score">
            <app-icon [name]="trophyIcon" [size]="14" aria-hidden="true" />
            <span>{{ score }}</span>
          </div>
        }
      </a>
    }
  </div>
</div>
