<div class="test-layout">
  <div class="test-header">
    <span class="phase-badge">{{ label() }}</span>
    <span class="phase-progress">{{ current() }} / {{ total() }}</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" [style.width.%]="percent"></div>
  </div>
  <div class="test-body">
    <ng-content />
  </div>
</div>
