@if (testService.progress(); as p) {
  <app-test-shell [label]="p.label" [current]="p.current" [total]="p.total">
    @if (testService.currentVocabQuestion(); as q) {
      <p class="instruction">Traduce al ingles:</p>
      <p class="word">{{ q.es }}</p>
      <input
        class="input"
        type="text"
        [value]="inputValue()"
        (input)="onInput($event)"
        (keydown)="onKeydown($event)"
        placeholder="Escribe en ingles..."
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
      />
      <div class="actions">
        <button class="btn-next" (click)="submit()" [disabled]="!inputValue().trim()">Siguiente</button>
        <button class="btn-skip" (click)="skip()">No lo se</button>
      </div>
    }
  </app-test-shell>
}
