@if (loading()) {
  <div class="loading-overlay">
    <div class="loading-spinner"></div>
    <p class="loading-text">Preparando preguntas...</p>
  </div>
}

@switch (phase()) {
  @case ('intro') {
    <app-test-intro (start)="onStart()" (skip)="onSkip($event)" />
  }
  @case ('vocabulary') {
    <app-test-vocab />
  }
  @case ('grammar') {
    <app-test-grammar />
  }
  @case ('listening') {
    <app-test-listening />
  }
  @case ('pronunciation') {
    <app-test-pronunciation />
  }
  @case ('results') {
    <app-test-results (testFinished)="onFinish()" />
  }
}
