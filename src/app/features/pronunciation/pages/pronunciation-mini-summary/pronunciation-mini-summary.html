<div class="mini-summary">
  <h1 class="summary-title">Session Complete</h1>

  <div class="average-score">
    <app-progress-ring
      [value]="state.averageScore()"
      [size]="88"
      role="meter"
      [attr.aria-valuenow]="state.averageScore()"
      aria-valuemax="100"
      aria-label="Average pronunciation score"
    />
    <div class="avg-info">
      <span class="avg-number">{{ state.averageScore() }}<span class="avg-max">/100</span></span>
      <span class="avg-label">Average Score</span>
    </div>
  </div>

  <div class="turns-list">
    @for (turn of state.miniConvTurns(); track turn.id) {
      <div class="turn-row">
        <p class="turn-prompt">{{ turn.prompt }}</p>
        @if (turn.score !== null) {
          <span
            class="score-chip"
            [class.score-low]="turn.score < 50"
            [class.score-mid]="turn.score >= 50 && turn.score < 80"
            [class.score-ok]="turn.score >= 80"
          >
            {{ turn.score }}
          </span>
        }
      </div>
    }
  </div>

  <div class="summary-actions">
    <button class="try-again-btn" type="button" (click)="onTryAgain()">Try Again</button>
    <button class="back-btn" type="button" (click)="onBackToLab()">Back to Lab</button>
  </div>
</div>
