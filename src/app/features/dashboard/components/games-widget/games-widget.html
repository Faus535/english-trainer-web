<div class="games-widget">
  <h3 class="gw-title">Practica rapida</h3>
  <div class="gw-grid">
    @for (game of games; track game.route) {
      <a class="gw-card" [routerLink]="game.route">
        <div class="gw-card-icon">
          <app-icon [name]="game.icon" [size]="20" aria-hidden="true" />
        </div>
        <span class="gw-card-name">{{ game.name }}</span>
        @let score = getBestScore(game.storageKey);
        @if (score !== null) {
          <span class="gw-card-score">
            <app-icon [name]="trophyIcon" [size]="10" aria-hidden="true" />
            {{ score }}
          </span>
        }
      </a>
    }
  </div>
</div>
