<div class="stats">
  <div class="stat">
    <span class="stat-val">{{ totalSessions() }}</span>
    <span class="stat-lbl">Sesiones</span>
  </div>
  <div class="stat">
    <span class="stat-val">{{ sessionsWeek() }}/4</span>
    <span class="stat-lbl">Esta semana</span>
  </div>
  <div class="stat">
    <span class="stat-val">{{ streak() }}</span>
    <span class="stat-lbl">Racha</span>
  </div>
  <div class="stat" [class.done]="sessionsWeek() >= 3">
    <span class="stat-val">{{ sessionsWeek() >= 3 ? '\u2713' : (3 - sessionsWeek()) }}</span>
    <span class="stat-lbl">{{ sessionsWeek() >= 3 ? 'Objetivo' : 'Faltan' }}</span>
  </div>
</div>
