<div class="phrase-roulette">
  <h4 class="pr-title">Frase Roulette</h4>
  <div class="pr-english" (click)="speakPhrase()">{{ phrase().en }}</div>

  @if (revealed()) {
    <div class="pr-spanish">{{ phrase().es }}</div>
    <div class="pr-hint">{{ phrase().hint }}</div>
    <button class="pr-btn" (click)="newPhrase()">Otra frase</button>
  } @else {
    <button class="pr-btn" (click)="reveal()">Ver significado</button>
  }
</div>
