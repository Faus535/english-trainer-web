<section class="plan-card">
  <h3 class="plan-title">Plan de hoy</h3>

  <div class="plan-stats">
    <div class="stat">
      <span class="stat-value">{{ plan().newItemsCount }}</span>
      <span class="stat-label">Nuevos</span>
    </div>
    <div class="stat">
      <span class="stat-value">{{ plan().reviewItemsCount }}</span>
      <span class="stat-label">Repaso</span>
    </div>
    <div class="stat">
      <span class="stat-value">{{ plan().estimatedMinutes }}</span>
      <span class="stat-label">Minutos</span>
    </div>
  </div>

  @if (totalItems() > 0) {
    <button class="btn-start" (click)="startSession()">
      <span>Empezar sesion</span>
      <span class="btn-meta">{{ sessionLabel() }} &middot; {{ plan().estimatedMinutes }}m</span>
    </button>
  } @else {
    <p class="plan-done">Todo al dia. Vuelve manana.</p>
  }
</section>
