<div class="levels">
  <span class="levels-title">Tu nivel</span>
  <div class="levels-row">
    @for (mod of modules; track mod) {
      <div class="level-item">
        <span class="level-val">{{ level(mod) }}</span>
        <span class="level-lbl">{{ label(mod) }}</span>
      </div>
    }
  </div>
</div>
