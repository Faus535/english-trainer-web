<div class="streak-banner" [class.streak-banner--active]="hasStreak()">
  <div class="streak-content">
    @if (hasStreak()) {
      <span class="streak-flame"></span>
    }
    <span class="streak-text">{{ message() }}</span>
  </div>
  @if (hasStreak()) {
    <span class="streak-countdown">{{ hoursRemaining() }}h restantes</span>
  }
</div>
