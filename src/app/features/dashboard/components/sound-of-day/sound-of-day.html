<div class="sound-of-day">
  <h4 class="sod-title">Sonido del Dia</h4>
  <div class="sod-sound">{{ sound.sound }}</div>
  <div class="sod-name">{{ sound.name }}</div>
  <div class="sod-words">
    @for (word of sound.words; track word) {
      <button class="sod-word" (click)="speakWord(word)">{{ word }}</button>
    }
  </div>
  <div class="sod-tip">{{ sound.tip }}</div>
</div>
