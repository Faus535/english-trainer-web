@if (finished()) {
  <div class="exercise-summary">
    <h3 class="exercise-summary-title">
      {{ results().filter(r => r).length }} / {{ results().length }} correctas
    </h3>
    <p class="exercise-instruction">Buen trabajo reconociendo los sonidos.</p>
    <button class="exercise-btn primary full-width" (click)="onFinish()">
      Continuar al dictado →
    </button>
  </div>
} @else if (current(); as q) {
  <div class="exercise-card">
    <h3 class="exercise-title">Reconocimiento de sonidos</h3>
    <span class="exercise-progress">{{ progress() }}</span>
    <p class="exercise-instruction">Escucha la palabra y elige cual has oido.</p>

    <div class="exercise-play-row">
      <button class="exercise-play-btn" (click)="playTarget()">Escuchar</button>
      <button class="exercise-play-btn secondary" (click)="playTarget()">Repetir</button>
    </div>

    <div class="exercise-options">
      <button
        class="option-btn"
        [class.correct]="isCorrectOption(q.pair.correct.word)"
        [class.wrong]="isWrongOption(q.pair.correct.word)"
        (click)="select(q.pair.correct.word)"
      >
        {{ q.pair.correct.word }} <span class="example-ipa">{{ q.pair.correct.ipa }}</span>
      </button>
      <button
        class="option-btn"
        [class.correct]="isCorrectOption(q.pair.incorrect.word)"
        [class.wrong]="isWrongOption(q.pair.incorrect.word)"
        (click)="select(q.pair.incorrect.word)"
      >
        {{ q.pair.incorrect.word }} <span class="example-ipa">{{ q.pair.incorrect.ipa }}</span>
      </button>
    </div>

    @if (selectedOption() !== null) {
      <button class="exercise-btn primary" (click)="next()">Siguiente</button>
    }
  </div>
}
