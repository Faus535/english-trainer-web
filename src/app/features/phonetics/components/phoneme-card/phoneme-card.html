<a
  class="card"
  [routerLink]="['/phonetics', phoneme().id]"
  [attr.aria-label]="phoneme().name + ' ' + phoneme().symbol"
>
  @if (completed()) {
    <span class="completed-dot" aria-label="Completado">&#10003;</span>
  }
  <span class="card-symbol">{{ phoneme().symbol }}</span>
  <span class="card-name">{{ phoneme().name }}</span>
</a>
