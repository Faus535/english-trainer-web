@if (todayPhoneme(); as today) {
  <a
    class="today-banner"
    [routerLink]="['/phonetics', today.phoneme.id]"
    aria-label="Fonema del dia: {{ today.phoneme.name }}"
  >
    <div class="today-left">
      <span class="today-label">Fonema del dia</span>
      <span class="today-symbol">{{ today.phoneme.symbol }}</span>
      <span class="today-name">{{ today.phoneme.name }}</span>
    </div>
    <div class="today-right">
      <div class="today-progress-bar">
        <div
          class="today-progress-fill"
          [style.width.%]="
            today.totalCount > 0 ? (today.completedCount / today.totalCount) * 100 : 0
          "
        ></div>
      </div>
      <span class="today-progress-text"> {{ today.completedCount }}/{{ today.totalCount }} </span>
      <span class="today-cta">Practicar</span>
    </div>
  </a>
}
