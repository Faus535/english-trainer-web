<div class="page">
  <div class="header">
    <a class="back-btn" routerLink="/speak" aria-label="Volver">
      <app-icon [name]="backIcon" [size]="20" aria-hidden="true" />
    </a>
    <h2 class="page-title">Fonetica</h2>
  </div>

  @if (loading()) {
    <div class="loading">Cargando fonemas...</div>
  } @else {
    <app-phonetics-progress-bar
      [completed]="completedCount()"
      [total]="progress().length || phonemes().length"
    />

    @if (allCompleted()) {
      <div class="all-completed-banner">
        <span class="all-completed-text">Has completado todos los fonemas!</span>
        <a class="all-completed-link" routerLink="/phonetics/complete">Ver logro</a>
      </div>
    } @else if (nextPhoneme(); as next) {
      <app-next-phoneme-banner
        [phoneme]="next"
        [position]="nextPhonemePosition()"
        [total]="progress().length"
      />
    }

    <app-phoneme-grid [phonemes]="phonemes()" [completedIds]="completedIds()" />
  }
</div>
