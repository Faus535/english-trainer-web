<div class="admin-crud">
  <div class="crud-header">
    <a routerLink="/admin" class="back-link">Admin</a>
    <h2 class="page-title">Frases</h2>
    <button class="add-btn" (click)="openCreate()">+ Nueva</button>
  </div>
  @if (showForm()) {
    <div class="form-card">
      <h3 class="form-title">{{ editing() ? 'Editar' : 'Nueva' }} frase</h3>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="crud-form">
        <div class="form-row">
          <div class="field">
            <label for="p-en">Ingles</label><input id="p-en" formControlName="en" />
          </div>
          <div class="field">
            <label for="p-es">Espanol</label><input id="p-es" formControlName="es" />
          </div>
        </div>
        <div class="field">
          <label for="p-lv">Nivel</label
          ><select id="p-lv" formControlName="level">
            @for (l of levels; track l) {
              <option [value]="l">{{ l | uppercase }}</option>
            }
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" (click)="closeForm()">Cancelar</button
          ><button type="submit" class="btn-save">Guardar</button>
        </div>
      </form>
    </div>
  }
  @if (loading()) {
    <div class="loading">Cargando...</div>
  } @else {
    <div class="table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th>EN</th>
            <th>ES</th>
            <th>Nivel</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (item of items(); track item.id) {
            <tr>
              <td>{{ item.en }}</td>
              <td>{{ item.es }}</td>
              <td>
                <span class="level-badge">{{ item.level | uppercase }}</span>
              </td>
              <td class="actions">
                <button class="action-btn edit" (click)="openEdit(item)">Editar</button
                ><button class="action-btn delete" (click)="deleteItem(item.id)">Eliminar</button>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="4" class="empty">No hay datos</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
