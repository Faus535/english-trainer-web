<div class="admin-crud">
  <div class="crud-header">
    <a routerLink="/admin" class="back-link">Admin</a>
    <h2 class="page-title">Vocabulario</h2>
    <button class="add-btn" (click)="openCreate()">+ Nuevo</button>
  </div>
  @if (showForm()) {
    <div class="form-card">
      <h3 class="form-title">{{ editing() ? 'Editar' : 'Nuevo' }} vocabulario</h3>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="crud-form">
        <div class="form-row">
          <div class="field">
            <label for="v-en">Ingles</label><input id="v-en" formControlName="en" />
          </div>
          <div class="field">
            <label for="v-es">Espanol</label><input id="v-es" formControlName="es" />
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label for="v-ipa">IPA</label><input id="v-ipa" formControlName="ipa" />
          </div>
          <div class="field">
            <label for="v-type">Tipo</label
            ><select id="v-type" formControlName="type">
              <option value="noun">Sustantivo</option>
              <option value="verb">Verbo</option>
              <option value="adjective">Adjetivo</option>
              <option value="adverb">Adverbio</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label for="v-ex">Ejemplo</label><input id="v-ex" formControlName="example" />
          </div>
          <div class="field">
            <label for="v-lv">Nivel</label
            ><select id="v-lv" formControlName="level">
              @for (l of levels; track l) {
                <option [value]="l">{{ l | uppercase }}</option>
              }
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" (click)="closeForm()">Cancelar</button
          ><button type="submit" class="btn-save">Guardar</button>
        </div>
      </form>
    </div>
  }
  @if (loading()) {
    <div class="loading">Cargando...</div>
  } @else {
    <div class="table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th>EN</th>
            <th>ES</th>
            <th>Nivel</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (item of items(); track item.id) {
            <tr>
              <td>{{ item.en }}</td>
              <td>{{ item.es }}</td>
              <td>
                <span class="level-badge">{{ item.level | uppercase }}</span>
              </td>
              <td class="actions">
                <button class="action-btn edit" (click)="openEdit(item)">Editar</button
                ><button class="action-btn delete" (click)="deleteItem(item.id)">Eliminar</button>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="4" class="empty">No hay datos</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
