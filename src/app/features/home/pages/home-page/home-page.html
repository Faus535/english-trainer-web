<section class="home-page">
  @if (loading()) {
    <div class="skeleton-layout" aria-busy="true">
      <div class="skeleton-card large"></div>
      <div class="skeleton-row">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </div>
  } @else if (data(); as home) {
    <div class="home-header">
      <app-streak-widget [streakDays]="home.streakDays" [weeklyActivity]="home.weeklyActivity" />
      <app-level-badge [level]="home.englishLevel" />
    </div>
    <app-daily-progress [recentXpThisWeek]="home.recentXpThisWeek" />
    <app-suggested-action-card
      [suggestedModule]="home.suggestedModule"
      [dueReviewCount]="home.dueReviewCount"
    />
    <app-recent-achievements-strip [achievements]="home.recentAchievements" />
  } @else {
    <div class="empty-state">
      <h1 class="greeting">Welcome</h1>
      <p class="empty-desc">Start a conversation or explore content to begin learning</p>
    </div>
  }
</section>
