<header class="header" role="banner">
  <a class="logo" routerLink="/dashboard" aria-label="English Trainer - Ir al dashboard">ET</a>
  @if (speaking()) {
    <button class="header-btn" (click)="stopAudio()" aria-label="Detener audio">
      <app-icon [name]="stopIcon" [size]="16" aria-hidden="true" />
    </button>
  }
</header>

<main class="main" tabindex="-1">
  <router-outlet />
</main>

<nav class="nav" aria-label="Navegacion principal">
  @for (tab of tabs; track tab.path) {
    <a
      class="nav-item"
      [routerLink]="tab.path"
      routerLinkActive="active"
      [attr.aria-current]="isActive(tab.path) ? 'page' : null"
      [attr.aria-label]="tab.label"
    >
      <app-icon [name]="tab.icon" [size]="20" [strokeWidth]="1.5" aria-hidden="true" />
      <span class="nav-label">{{ tab.label }}</span>
      <span class="nav-dot" aria-hidden="true"></span>
    </a>
  }
</nav>

<app-connection-status />
<app-toast />
