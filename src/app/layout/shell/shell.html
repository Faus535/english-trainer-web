@if (showChrome()) {
  <header class="header" role="banner">
    <a class="logo" routerLink="/home" aria-label="English Trainer - Go to home">ET</a>
    @if (speaking()) {
      <button class="header-btn" (click)="stopAudio()" aria-label="Detener audio">
        <app-icon [name]="stopIcon" [size]="16" aria-hidden="true" />
      </button>
    }
  </header>

  <aside class="sidebar" aria-label="Navegacion principal">
    @for (tab of visibleTabs; track tab.path) {
      <a
        class="sidebar-item"
        [routerLink]="tab.path"
        routerLinkActive="active"
        [attr.aria-current]="isActive(tab.path) ? 'page' : null"
      >
        <app-icon [name]="tab.icon" [size]="20" [strokeWidth]="1.5" aria-hidden="true" />
        <span class="sidebar-label">{{ tab.label }}</span>
      </a>
    }
  </aside>
}

<main class="main" tabindex="-1">
  <router-outlet />
</main>

@if (showChrome()) {
  <nav class="nav" aria-label="Navegacion principal">
    @for (tab of visibleTabs; track tab.path) {
      <a
        class="nav-item"
        [routerLink]="tab.path"
        routerLinkActive="active"
        [attr.aria-current]="isActive(tab.path) ? 'page' : null"
        [attr.aria-label]="tab.label"
      >
        <app-icon [name]="tab.icon" [size]="20" [strokeWidth]="1.5" aria-hidden="true" />
        <span class="nav-label">{{ tab.label }}</span>
        <span class="nav-dot" aria-hidden="true"></span>
      </a>
    }
  </nav>
}

<app-connection-status />
<app-toast />
<app-idle-warning-modal (logoutRequested)="onIdleLogout()" />

<app-onboarding (completed)="onOnboardingCompleted()" />
